  <script>
    (function() {
      // 包含你专属地图 ID 的深色模式切换脚本
      const themeToggle = document.getElementById('themeToggle');
      const icon = themeToggle.querySelector('i');
      
      function updateMap(isDark) {
        const MAP_BASE = 'https://www.clustrmaps.com/map_v2.png?w=240&t=tt&d=oN3PSbXCenJjht4NP1fUil5uQCRTebhjB3D_MTyaXHA';
        const co = isDark ? '1a1917' : 'faf9f7';
        const cl = isDark ? 'e28a67' : 'c2714f';
        const ct = isDark ? 'd1cec7' : '3d3929';
        
        const img = document.getElementById('clustrmap-sidebar');
        if (img) {
          img.src = MAP_BASE + '&cl=' + cl + '&co=' + co + '&ct=' + ct;
          if (!img.parentElement || img.parentElement.tagName !== 'A') {
            const link = document.createElement('a');
            link.href = 'https://clustrmaps.com/site/1c9ot';
            link.title = 'ClustrMaps';
            img.parentNode.insertBefore(link, img);
            link.appendChild(img);
          }
        }
      }

      function setTheme(isDark) {
        if (isDark) {
          document.documentElement.setAttribute('data-theme', 'dark');
          icon.classList.replace('fa-moon', 'fa-sun');
          localStorage.setItem('theme', 'dark');
        } else {
          document.documentElement.setAttribute('data-theme', 'light');
          icon.classList.replace('fa-sun', 'fa-moon');
          localStorage.setItem('theme', 'light');
        }
        updateMap(isDark);
      }

      const savedTheme = localStorage.getItem('theme');
      const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
      if (savedTheme === 'dark' || (!savedTheme && prefersDark)) setTheme(true);
      else setTheme(false);

      themeToggle.addEventListener('click', () => {
        const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
        setTheme(!isDark);
      });
      window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', (e) => {
        if (!localStorage.getItem('theme')) setTheme(e.matches);
      });
    })();
  </script>

</body>
